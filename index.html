<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVC 龍個性助手 - 電腦高清版</title>
    <style>
        :root { --primary: #2d5a27; --accent: #e7f4e9; --text: #333; --border: #c3e6cb; --danger: #d9534f; --dark-green: #1b4332; --gold: #f0ad4e; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f0f2f0; padding: 40px 20px; color: var(--text); font-size: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--primary); padding-bottom: 15px; font-size: 36px; }
        
        .section-title { font-weight: bold; margin-bottom: 20px; display: block; color: #555; border-left: 8px solid var(--primary); padding-left: 15px; font-size: 24px; }
        
        /* 數值輸入區 */
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .input-card { background: var(--accent); padding: 20px; border-radius: 12px; border: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .input-card label { font-weight: bold; color: var(--primary); margin-bottom: 10px; font-size: 22px; }
        input[type="number"] { width: 100px; padding: 12px; border: 2px solid #99bfa1; border-radius: 8px; font-size: 24px; text-align: center; font-weight: bold; }

        /* 滑動開關區 */
        .switch-group { background: #f9f9f9; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #eee; }
        .switch-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 64px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(30px); }

        /* 個性選擇 */
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .check-item { background: #fff; border: 2px solid #ddd; padding: 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; font-size: 18px; font-weight: bold; transition: 0.2s; }
        .check-item:hover { border-color: var(--primary); background: #f9fff9; }
        .check-item input { margin-right: 15px; scale: 1.6; }

        button { width: 100%; padding: 22px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 28px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1e3d1a; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        /* 計算結果 */
        #result { margin-top: 50px; display: none; }
        .summary-header { font-size: 28px; margin-bottom: 25px; font-weight: bold; text-align: center; color: var(--text); }
        .poison-msg { color: #856404; background: #fff3cd; padding: 20px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-size: 20px; border: 1px solid #ffeeba; font-weight: bold; }
        .result-card { border: 2px solid var(--border); border-radius: 15px; overflow: hidden; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .result-card-header { background: #a8d5ba; padding: 18px; font-weight: bold; text-align: center; color: var(--primary); font-size: 24px; }
        .val-bar { background: var(--dark-green); color: #fff; padding: 15px; margin: 20px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; }
        .train-list { padding: 0 25px 25px 25px; font-size: 20px; color: var(--danger); font-weight: bold; line-height: 2.2; }
        .highlight { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h2> DVC 訓練路徑助手</h2>
    
    <span class="section-title">輸入基礎數值</span>
    <div class="matrix-grid">
        <div class="input-card"><label> 爆發力</label><input type="number" id="v3" value="0"></div>
        <div class="input-card"><label> 肌力</label><input type="number" id="v0" value="0"></div>
        <div class="input-card"><label> 集中力</label><input type="number" id="v1" value="0"></div>
        <div class="input-card"><label> 智力</label><input type="number" id="v2" value="0"></div>
    </div>

    <div class="switch-group">
        <div class="switch-item">
            <span style="font-weight: bold; font-size: 20px;"> 允許使用注射毒液 (最高項 -10)</span>
            <label class="switch"><input type="checkbox" id="poisonToggle"><span class="slider"></span></label>
        </div>
        <div style="font-size: 16px; color: #666;">計算優先權： >  >  > </div>
    </div>

    <span class="section-title">目標個性</span>
    <div class="checkbox-grid">
        <label class="check-item"><input type="checkbox" name="per" value="adored" checked> 憧憬的 (總和100)</label>
        <label class="check-item"><input type="checkbox" name="per" value="ordinary"> 平凡 (四項相同)</label>
        <label class="check-item"><input type="checkbox" name="per" value="distracted"> 漫不經心 (項差≧15/禁集中)</label>
        <label class="check-item"><input type="checkbox" name="per" value="sparkling"> 亮晶晶 (差≧8/≧70)</label>
        <label class="check-item"><input type="checkbox" name="per" value="reed"> 蘆葦 (5xS, 5xP)</label>
        <label class="check-item"><input type="checkbox" name="per" value="noble"> 氣度不凡 (一輪359)</label>
    </div>

    <button onclick="startCalculation()"> 開始精密路徑計算</button>
    <div id="result"></div>
</div>

<script>
// 使用 Unicode 字元碼以確保相容性
const StatNames = ["肌力", "集中力", "智力", "爆發力"];
const Icons = ["\uD83D\uDCAA", "\uD83C\uDFAF", "\uD83D\uDCD6", "\uD83D\uDC5F"]; // , , , 
const DisplayOrder = [3, 0, 1, 2];
const SearchPreference = [0, 2, 3, 1];

const Conditions = {
    adored: (s) => s.reduce((a,b)=>a+b, 0) === 100,
    ordinary: (s) => s.every(v => v === s[0]) && s.reduce((a,b)=>a+b,0) <= 100,
    distracted: (s, p) => {
        if (p.some(step => step.idx === 1)) return false;
        let sorted = [...s].sort((a,b) => a-b);
        for(let i=0; i<3; i++) if(sorted[i+1] - sorted[i] < 15) return false;
        return true;
    },
    sparkling: (s) => {
        let sorted = [...s].sort((a,b) => a-b);
        for(let i=0; i<3; i++) if(sorted[i+1] - sorted[i] < 8) return false;
        return s.some(v => v >= 70);
    },
    reed: (s, p) => {
        return p.filter(x => x.val === 9).length >= 5 && p.filter(x => x.val === 3).length >= 5;
    },
    noble: (s, p) => [0,1,2,3].every(i => {
        let t = p.filter(x => x.idx === i).map(x => x.val);
        return [3,5,9].every(v => t.includes(v));
    })
};

function solve(base, targets) {
    let queue = [{ stats: [...base], path: [] }];
    let visited = new Set();
    let maxSteps = (targets.includes('noble') || targets.includes('reed') || targets.includes('distracted')) ? 30 : 20;
    
    while (queue.length > 0) {
        let { stats, path } = queue.shift();
        let key = stats.join(',') + (targets.includes('noble') ? "_" + path.length : "");
        if (visited.has(key)) continue; visited.add(key);

        if (targets.every(t => Conditions[t](stats, path))) return { stats, path };
        if (targets.includes('adored') && stats.reduce((a,b)=>a+b,0) > 100) continue;
        if (path.length >= maxSteps) continue;

        for (let i of SearchPreference) {
            if (targets.includes('distracted') && i === 1) continue;
            for (let v of [9, 5, 3]) {
                let next = [...stats]; next[i] += v;
                queue.push({ stats: next, path: [...path, { idx: i, val: v }] });
            }
        }
    }
    return null;
}

function startCalculation() {
    const base = [0,1,2,3].map(i => parseInt(document.getElementById('v'+i).value) || 0);
    const usePoison = document.getElementById('poisonToggle').checked;
    const selected = Array.from(document.querySelectorAll('input[name="per"]:checked')).map(el => el.value);
    const resArea = document.getElementById('result');
    
    resArea.style.display = "block";
    resArea.innerHTML = "<div style='text-align:center; font-size:24px;'> 正在為您計算最佳路徑...</div>";

    setTimeout(() => {
        let finalResult = solve(base, selected);
        let poisonUsed = false;

        if (usePoison) {
            let maxIdx = base.indexOf(Math.max(...base));
            let pBase = [...base]; pBase[maxIdx] = Math.max(0, pBase[maxIdx] - 10);
            let pRes = solve(pBase, selected);
            if (pRes && (!finalResult || pRes.path.length < finalResult.path.length)) {
                finalResult = pRes; poisonUsed = true;
            }
        }

        if (!finalResult) {
            resArea.innerHTML = "<div style='color:red; text-align:center; padding:30px; border:3px solid red; border-radius:15px; font-size:24px; font-weight:bold;'> 無法達成此組合：試著開啟毒液或調整數值</div>";
        } else {
            let html = poisonUsed ? "<div class='poison-msg'> 自動套用「注射毒液」：請先將基礎值最高的一項減 10</div>" : "";
            html += `<div class='summary-header'>最少需進行 <span style='font-size:40px; color:#d9534f;'>${finalResult.path.length}</span> 次訓練</div>`;
            html += `<div class='matrix-grid'>`;
            for (let i of DisplayOrder) {
                let steps = finalResult.path.filter(p => p.idx === i);
                let added = steps.reduce((a, b) => a + b.val, 0);
                html += `
                    <div class="result-card">
                        <div class="result-card-header">${Icons[i]} ${StatNames[i]}訓練</div>
                        <div class="val-bar">${StatNames[i]}：${base[i]} <span class="highlight">(+${added})</span></div>
                        <div class="train-list">
                            ${[9,5,3].map(v => {
                                let c = steps.filter(s => s.val === v).length;
                                return c > 0 ? `+${v} ${v==9?'PERFECT':v==5?'GOOD':'SO-SO'} × <span style='color:#d9534f; font-size:24px;'>${c}</span><br>` : '';
                            }).join('')}
                            ${added === 0 ? '<span style="color:#aaa">+0 (維持現狀)</span>' : ''}
                        </div>
                    </div>`;
            }
            resArea.innerHTML = html + "</div>";
        }
    }, 50);
}
</script>
</body>
</html>
